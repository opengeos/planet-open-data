name: Update Planet STAC footprints

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-footprints-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-footprints:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Sync branch
        run: git pull --ff-only origin "$GITHUB_REF_NAME"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install FreeStiler
        run: |
          python -m pip install --upgrade pip
          python -m pip install freestiler
          python -c "from importlib.metadata import version; print(f'freestiler {version(\"freestiler\")}')"

      - name: Generate GeoJSON and PMTiles
        run: |
          python scripts/generate_planet_footprints.py \
            --output-dir data \
            --workers 24 \
            --fetch-retries 2 \
            --fetch-timeout 20 \
            --progress-interval 100 \
            --require-freestiler

      - name: Commit updated footprints
        run: |
          if [ -z "$(git status --porcelain -- data)" ]; then
            echo "No footprint changes detected."
            exit 0
          fi

          git config user.name "giswqs"
          git config user.email "giswqs@gmail.com"
          git add -A data
          git commit -m "Update Planet STAC footprints"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push
